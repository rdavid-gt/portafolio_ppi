<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú</title>
    <style>
        /* =========================
        BOTÓN MENÚ
        ========================= */
        .menu-btn {
            position: fixed;
            top: 10px;
            right: 30px;
            font-size: 28px;
            cursor: pointer;
            background: #1e3a8a;
            color: white;
            padding: 5px 15px;
            border-radius: 8px;
            z-index: 1000;
        }

        /* =========================
        SIDEBAR DERECHO
        ========================= */
        .sidebar {
            position: fixed;
            top: 0;
            right: -250px; /* Oculto */
            width: 250px;
            height: 100%;
            background: #2563eb;
            padding-top: 80px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-left: 20px;
        }

        /* Cuando esté activo */
        .sidebar.active {
            right: 0;
        }

        /* Links como botones */
        .sidebar a {
            display: block;
            background: white;
            color: #2563eb;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>

        <div id="sidebar" class="sidebar">
            <a href="index.html">Inicio</a>
            <a href="about.html">Acerca de mi</a>
            <a href="practica_2.html">Práctica 2</a>
            <a href="Practica_3/index.html">Práctica 3</a>
            <a href="Practica_4/">Práctica 4</a>
            <a href="Practica_5/tabla.html">Práctica 5</a>
            <a href="Practica_6/multimedia.html">Práctica 6</a>
        </div>
    </div>
    <script src="menu.js"></script>
</body>
</html>
